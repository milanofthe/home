name: Fetch Data

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch GitHub stats
        run: npm run fetch-stats
        env:
          # Unauthenticated GitHub API calls 403 on shared runner IPs; the
          # automatic token has ample rate for public reads.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch star history
        run: npm run fetch-star-history
        env:
          # The automatic installation token cannot read foreign repos'
          # stargazer timelines ("Resource not accessible by integration").
          # Prefer a fine-grained PAT (STARS_TOKEN, public read) when set;
          # without it the script skips the timeline gracefully.
          GITHUB_TOKEN: ${{ secrets.STARS_TOKEN != '' && secrets.STARS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/data/github-stats.json
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Update data"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
